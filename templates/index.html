<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GiveawayMaster - Сторінка 1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Якщо не використовуєш Flask, заміни {{ url_for }} на прямий шлях, наприклад "static/styles.css" -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .container {
            padding: 20px;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
<div class="loading-screen">
    <div class="pulse-container">
        <div class="pulse-wave"></div>
        <div class="pulse-wave"></div>
        <div class="percentage">0%</div>
    </div>
</div>

<style>
.loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    max-width: 600px;
    margin: 0 auto;
    background: url('/WINIX/static/css/фон.png') no-repeat center center;
    background-size: cover; /* Щоб фон заповнив весь екран */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.pulse-container {
    position: relative;
    width: 100px;
    height: 100px;
}

.pulse-wave {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, rgba(0, 0, 255, 0.3), rgba(128, 0, 128, 0));
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 2s infinite;
}

.pulse-wave:nth-child(2) {
    animation-delay: 0.5s;
}

.percentage {
    position: absolute;
    top: 70%;
    left: 50%;
    transform: translate(-50%, 0);
    color: #fff;
    font-size: 24px;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
}

@keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}
</style>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

function updateProgress(percent) {
    const percentageText = document.querySelector('.percentage');
    percentageText.textContent = `${Math.round(percent)}%`;
}

let progress = 0;
const loadingInterval = setInterval(() => {
    progress += Math.random() * 10;
    if (progress >= 100) {
        progress = 100;
        clearInterval(loadingInterval);
        setTimeout(() => {
            document.querySelector('.loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.querySelector('.loading-screen').style.display = 'none';
            }, 300);
        }, 500);
    }
    updateProgress(progress);
}, 200);

document.querySelector('.loading-screen').style.transition = 'opacity 0.3s ease';
</script>
